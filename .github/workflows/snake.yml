name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Move output to safe location
        run: |
          sudo mkdir -p /tmp/snake-output
          sudo cp -r dist/* /tmp/snake-output/
          sudo chown -R $USER:$USER /tmp/snake-output

      - uses: actions/checkout@v4
        with:
          ref: output

      - name: push
        run: |
          cp -r /tmp/snake-output/* .
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "generate snake animation" || echo "no changes"
          git push
